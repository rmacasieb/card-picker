name: CardPicker
options:
  bundleIdPrefix: com.rmacasieb
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    ENABLE_PREVIEWS: YES
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1,2"
targets:
  CardPicker:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    bundleIdPrefix: com.rmacasieb
    sources:
      - path: CardPicker
    info:
      path: CardPicker/Info.plist
      properties:
        CFBundleDisplayName: Card Picker
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rmacasieb.cardpicker
        INFOPLIST_FILE: CardPicker/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: CardPicker/CardPicker.entitlements
